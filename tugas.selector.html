<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Selector Universal */
* {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* Selector Tag */
p {
    color: blue;
    margin: 10px;
}

/* Selector Class */
.paragraf {
    background-color: lightyellow;
    padding: 10px;
}

/* Selector ID */
#judul {
    color: darkgreen;
    text-align: center;
    margin: 20px;
}

/* Selector Class tambahan */
.tombol {
    background-color: orange;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 10px;
    cursor: pointer;
}

    </style>

</head>
<body>
        <h1 id="judul">Belajar Selector CSS</h1>

    <p class="paragraf">
        Ini adalah paragraf dengan selector class.
    </p>

    <p>
        Ini adalah paragraf dengan selector tag.
    </p>

    <button class="tombol">Klik Saya</button>

</body>
</html>

</body>
</html>
